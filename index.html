<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ujwal Doijode</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Cursor Glow -->
  <div class="cursor-glow"></div>

  <!-- Main Container -->
  <main class="container">

    <!-- Left Content -->
    <section class="content">
      <p class="intro">Hi, I’m</p>

      <h1 class="name">
        Ujwal Doijode
      </h1>

      <h2 class="typing" id="typing"></h2>

      <p class="tagline">
        Building AI systems, scalable backend platforms, and high-performance web apps.
      </p>

      <div class="buttons">
        <button class="btn primary">View Work</button>
        <button class="btn secondary">Contact</button>
      </div>
    </section>

    <!-- Profile Image -->
    <section class="image-container">
      <div class="image-glow"></div>
      <img src="profile.jpg" alt="Profile" class="profile" />
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
